<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IndexedDB CRUD Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.4rem 1rem; margin: 0.25rem; cursor: pointer; }
    .post { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.75rem; border-bottom: 1px solid #eee; }
    .post-title { font-weight: bold; }
    .post-body { color: #555; font-size: 0.85rem; margin-top: 0.25rem; max-width: 500px; }
    #status { color: #888; font-size: 0.85rem; margin-top: 0.5rem; }
    #count { font-size: 0.85rem; color: #555; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h2>IndexedDB — CRUD Demo</h2>
  <p style="color:#555; font-size:0.9rem">Data persists in IndexedDB. Refresh the page — items are still here.</p>

  <div>
    <button onclick="fetchAndStore()">Fetch 10 Posts & Store</button>
    <button onclick="clearAll()">Clear All</button>
    <button onclick="renderList()">Refresh List</button>
  </div>
  <div id="status"></div>
  <div id="count"></div>
  <div id="post-list" style="margin-top:1rem"></div>

  <p style="margin-top:1.5rem"><a href="search.html">Search / Cursor demo →</a></p>

  <!-- type="module" required to use ES module import syntax -->
  <script type="module">
    import { putPost, getAllPosts, deletePost, countPosts } from './db.js';

    // Expose functions to HTML onclick handlers
    window.fetchAndStore = async () => {
      setStatus('Fetching from API...');
      const res = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=10');
      const posts = await res.json();

      // Store each post in IndexedDB — put() acts as upsert (insert or update)
      for (const post of posts) {
        await putPost(post);
      }

      setStatus(`Stored ${posts.length} posts in IndexedDB`);
      await renderList();
    };

    window.deleteItem = async (id) => {
      await deletePost(id);
      await renderList();
    };

    window.renderList = async () => {
      const posts = await getAllPosts();
      const count = await countPosts();

      document.getElementById('count').textContent = `${count} item(s) in IndexedDB`;

      const container = document.getElementById('post-list');
      if (posts.length === 0) {
        container.innerHTML = '<p style="color:#aaa">No posts cached. Click "Fetch & Store" to load data.</p>';
        return;
      }

      container.innerHTML = posts.map(post => `
        <div class="post">
          <div>
            <div class="post-title">#${post.id} — ${post.title}</div>
            <div class="post-body">${post.body.slice(0, 80)}...</div>
          </div>
          <button onclick="deleteItem(${post.id})">Delete</button>
        </div>
      `).join('');
    };

    window.clearAll = async () => {
      const posts = await getAllPosts();
      for (const p of posts) await deletePost(p.id);
      setStatus('Cleared all posts');
      await renderList();
    };

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    // Load existing data on page start
    renderList();
  </script>
</body>
</html>
