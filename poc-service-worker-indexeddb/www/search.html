<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IndexedDB Search</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    input, button { padding: 0.4rem 0.8rem; margin: 0.25rem; }
    .result { padding: 0.5rem; border-bottom: 1px solid #eee; }
    #log { background: #f7fafc; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 0.8rem; margin-top: 1rem; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>IndexedDB — Cursor &amp; Index Search</h2>
  <p style="color:#555; font-size:0.9rem">First fetch data from the main page, then search here.</p>

  <div>
    <input id="search-input" placeholder="Search in title..." style="width:250px" />
    <button onclick="searchByIndex()">Search via Index</button>
    <button onclick="cursorScan()">Full Cursor Scan</button>
  </div>

  <div id="results" style="margin-top:1rem"></div>
  <div id="log"></div>

  <script type="module">
    const DB_NAME = 'PostCacheDB';
    const STORE_NAME = 'posts';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    // Cursor: iterates over all records one by one — useful for filtering
    // Unlike getAll(), a cursor lets you process each record before loading the next
    window.cursorScan = async () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      const db = await openDB();
      const results = [];
      let scanned = 0;

      log('Starting cursor scan...');

      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).openCursor();

        req.onsuccess = (event) => {
          const cursor = event.target.result;
          if (!cursor) {
            resolve(); // no more records
            return;
          }

          scanned++;
          // Filter in JavaScript as we iterate
          if (!query || cursor.value.title.toLowerCase().includes(query)) {
            results.push(cursor.value);
          }

          cursor.continue(); // advance to next record
        };

        req.onerror = () => reject(req.error);
      });

      log(`Cursor scanned ${scanned} records, found ${results.length} matches`);
      renderResults(results);
    };

    // Index search: uses the 'by_title' index created in db.js
    // More efficient than a full scan for exact matches
    window.searchByIndex = async () => {
      const query = document.getElementById('search-input').value;
      if (!query) { window.cursorScan(); return; }

      const db = await openDB();

      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const index = tx.objectStore(STORE_NAME).index('by_title');

        // IDBKeyRange filters by index value — exact, bound, or prefix
        // Here we scan via cursor on the index (ordered by title)
        const results = [];
        const req = index.openCursor();

        req.onsuccess = (event) => {
          const cursor = event.target.result;
          if (!cursor) { resolve(); renderResults(results); return; }
          if (cursor.value.title.toLowerCase().includes(query.toLowerCase())) {
            results.push(cursor.value);
          }
          cursor.continue();
        };

        req.onerror = () => reject(req.error);
        log(`Index search for: "${query}"`);
      });
    };

    function renderResults(items) {
      const container = document.getElementById('results');
      if (items.length === 0) {
        container.innerHTML = '<p style="color:#aaa">No results.</p>';
        return;
      }
      container.innerHTML = items.map(p =>
        `<div class="result"><strong>#${p.id}</strong> — ${p.title}</div>`
      ).join('');
    }

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
    }
  </script>
</body>
</html>
