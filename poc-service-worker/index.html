<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Worker PoC</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Service Worker PoC</h1>
    <p>This app works offline!</p>

    <!-- Status indicator: shows whether the SW is active and connection state -->
    <div id="sw-status" style="margin-top:1rem; padding:0.75rem; border-radius:6px; font-size:0.9rem;"></div>

    <!-- Background Sync demo: form that queues when offline -->
    <div style="margin-top:2rem; padding:1rem; border:1px solid #ddd; border-radius:8px; max-width:400px;">
      <h3 style="margin-top:0">Background Sync Demo</h3>
      <p style="font-size:0.9rem; color:#555;">Turn off your network and submit — the message will sync when you reconnect.</p>
      <form id="sync-form">
        <input
          id="message-input"
          type="text"
          placeholder="Type a message..."
          style="width:100%; padding:0.5rem; margin-bottom:0.5rem; box-sizing:border-box;"
        />
        <button type="submit" style="padding:0.5rem 1rem;">Send Message</button>
      </form>
    </div>

    <script src="app.js"></script>
  </body>
</html>
