<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Offline</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #e53e3e; margin-bottom: 0.5rem; }
    p { color: #555; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; cursor: pointer; border: none; background: #3182ce; color: white; border-radius: 6px; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
